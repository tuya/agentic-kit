# ESP32 Configuration - CI Environment
# Lines starting with # are comments
# This file is used by clink (client) in CI environment

# MQTT Broker Configuration
host=localhost
port=8443
broker_url=mqtt://localhost:8883

# Authentication Configuration
client_id=esp32_ci_test_client
sec_key=1234567890abcdef

# Device Configuration
device_id=ci_device_test_001
ai_solution_code=solution_ai_test

# Encryption Configuration (16 bytes)
local_key=1234567890abcdef


# Device Activation Configuration
# uuid: device unique identifier
# authkey: authentication key for activation (MD5 hashed for password)
uuid=uuid_ci_test_12345678
authkey=ci_authkey_1234567890abcdef

# ATOP Activation Request Configuration
# token: activation token (required)
# sw_ver: software version (required)
# product_key: product key (required)
# pv: protocol version (required, e.g., "2.0")
# bv: baseline version (required, e.g., "1.0")
# devid: device ID (optional, for already activated devices)
# modules: modules string (optional)
# feature: feature string (optional)
# skill_param: skill parameter (optional)
# firmware_key: firmware key (optional)
token=ci_test_token
sw_ver=1.0.0
product_key=ci_test_product_key
pv=2.0
bv=1.0
devid=
modules=
feature=
skill_param=
firmware_key=

